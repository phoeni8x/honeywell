name: Deploy Vercel Preview

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  push-noop:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Skip preview deploy on push
        run: echo "Preview deploy runs on pull_request or manual dispatch only."

  deploy-preview:
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::Skipping preview deploy. Set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID in repository secrets."
            echo "Preview deploy skipped because required Vercel secrets are missing." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Preview Artifacts
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy Preview
        id: deploy
        run: |
          PREVIEW_URL=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Add preview URL to summary
        run: echo "Preview URL: ${{ steps.deploy.outputs.preview_url }}" >> "$GITHUB_STEP_SUMMARY"
